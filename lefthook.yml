# Lefthook — lexsim pre-commit / pre-push hooks
#
# Mirrors the quality gates of the parent handoff-mcp workspace so this
# standalone crate is held to the same bar. All cargo commands are routed
# through scripts/cargo-env.sh so the hooks work across heterogeneous dev
# environments (local macOS, a synced Mac, Docker): the script falls back to a
# writable $HOME/.cargo when CARGO_HOME points at a location the current user
# cannot write to.
#
# Enable once after cloning:  lefthook install

pre-commit:
  parallel: false
  commands:
    fmt-check:
      glob: "**/*.rs"
      run: . scripts/cargo-env.sh && cargo fmt --all -- --check
      fail_text: "rustfmt failed. Run 'cargo fmt --all' to fix."

    clippy:
      glob: "**/*.rs"
      run: . scripts/cargo-env.sh && cargo clippy --all-targets -- -D warnings
      fail_text: "clippy warnings found. Fix all warnings before committing."

    test:
      glob: "**/*.rs"
      run: . scripts/cargo-env.sh && cargo test --all-targets && cargo test --doc
      fail_text: "Tests failed. All tests (incl. doc-tests) must pass before committing."

pre-push:
  parallel: false
  commands:
    full-test:
      run: . scripts/cargo-env.sh && cargo test --all-targets && cargo test --doc
      fail_text: "Tests failed."

    full-clippy:
      run: . scripts/cargo-env.sh && cargo clippy --all-targets -- -D warnings
      fail_text: "clippy warnings found."

    fmt-check:
      run: . scripts/cargo-env.sh && cargo fmt --all -- --check
      fail_text: "rustfmt failed."

    audit:
      run: . scripts/cargo-env.sh && cargo audit
      fail_text: "Known vulnerabilities found in dependencies."

    deny:
      run: . scripts/cargo-env.sh && cargo deny check
      fail_text: "License or supply-chain policy violation."

    secrets:
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks protect --staged --no-banner
        else
          echo "WARN: gitleaks not installed, skipping secret scan"
        fi
      fail_text: "Potential secrets detected. Remove before pushing."
